<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorsa - Mammaaksa Oromoo</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; text-align: center; }
        nav { background: #000; padding: 15px; border-bottom: 3px solid #cc0000; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; text-decoration: none; margin: 0 12px; font-weight: bold; }
        .container { padding: 30px 15px; max-width: 600px; margin: 0 auto; }
        .gorsa-card { background: white; color: #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: left; border-left: 8px solid #cc0000; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .date { font-size: 11px; color: #888; display: block; margin-top: 10px; font-style: italic; }
        #loading { color: #ccc; margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Mammaaksa</a>
    <a href="videos.html">Viidiyoo</a>
    
    <a href="gorsa.html" style="color: #cc0000;">Gorsa</a>
    <a href="login.html">Login</a>
</nav>

<div class="container">
    <h1>Gorsa Motivation</h1>
    <div id="loading">Gorsi fe'amaa jira...</div>
    <div id="gorsa-list"></div>
</div>

<script>
    // 1. SHEET_ID_KEE bakka buusi (Kan URL Sheets keetii irraa fudhatte)
    const sheetID = '1KgWpUOk7mZbxMgpakttLBiuEplNub33EZx2_i/edit?usp=drivesdk'; 
    
    // URL CSV bifa kanaan fetch gochuuf
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv`;

    fetch(url)
        .then(res => {
            if (!res.ok) throw new Error('Sheets argachuu hin dandeenye');
            return res.text();
        })
        .then(data => {
            // Sarara hunda addaan baasuu
            const lines = data.split('\n');
            let html = '';

            // Sarara jalqabaa (Header) hir'isanii warra kaan reverse gochuu
            const rows = lines.slice(1).reverse();

            rows.forEach(line => {
                // CSV addaan baasuu (comma jiruun)
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (cols.length >= 2) {
                    const title = cols[0].replace(/"/g, "");
                    const body = cols[1].replace(/"/g, "");
                    const date = cols[2] ? cols[2].replace(/"/g, "") : "";

                    html += `
                        <div class="gorsa-card">
                            <h3 style="margin:0; color:#000;">${title}</h3>
                            <p style="margin:10px 0; color:#444;">${body}</p>
                            <span class="date">${date}</span>
                        </div>
                    `;
                }
            });

            document.getElementById('gorsa-list').innerHTML = html;
            document.getElementById('loading').style.display = 'none';
        })
        .catch(err => {
            document.getElementById('loading').innerHTML = 
                `<p style="color:red;">Yeroof hojii hin jalqabne nuuf obsaa!.'Publish to Web' </p>`;
            console.error(err);
        });
</script>

</body>
</html>
