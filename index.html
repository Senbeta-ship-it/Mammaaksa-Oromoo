<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mammaaksa Oromoo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            /* Jijjiirama guddaan as jira */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 50px;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: #fff;
            color: #333;
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border-bottom: 10px solid #cc0000;
            border-top: 10px solid #000;
            margin-bottom: 50px; /* Footer irraa akka fagaatu */
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; color: #222; }

        .quote-box {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border-left: 5px solid #cc0000;
            border-radius: 10px;
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        button {
            background: #000;
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        button:hover { background: #cc0000; }

        footer {
            width: 100%;
            text-align: center;
            padding: 30px 0;
            background-color: #f1f1f1;
            color: #333;
            border-top: 2px solid #ddd;
            margin-top: auto; /* Akka gadi bu'u godha */
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }

        .social-icons img {
            width: 35px;
            transition: 0.3s;
        }

        .social-icons img:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mammaaksa Oromoo</h1>
        <p style="color: #777;">Ogummaa Abbootii</p>
        
        <div class="quote-box" id="mammaaksa-display">
            "Abbaan dammaa harka isaa damma."
        </div>

        <button onclick="newMammaaksa()">Mammaaksa Biraa</button>
    </div>

    <footer>
        <p style="font-weight: bold;">
          Yaadota dabalataaf kanan   Na qunnamaa:</p>
        <div class="social-icons">
            <a href="https://t.me/@Juruum" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram">
            </a>
            <a href="https://www.tiktok.com/@sa.z.winner" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
            </a>
            <a href="https://www.facebook.com/Juruum" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
</a>
            <a href="https://github.com/senbeta-ship-it" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub">
            </a>
        </div>
        <p style="font-size: 12px; color: #666;">© 2026 Mammaaksa Oromoo</p>
    </footer>

    <script>
        const mammaaksota = [
            "Abbaan dammaa harka isaa damma.",
            "Gamni gorsa beeka, gowwaan immoo rakkina.",
            "Haati dabeessaa ija hin dunnattu.",
            "Oduun baduun, deebi’uun hin badu.",
            "Bishaan deemee deemee bakka ciisaa isaa hin wallaalu.",
            "Kan qabateen badu, kan gadhiseen fadu.",
            "Luka dhuunfaa qabanitti daggala ce'u.",
            "Dhugaan ni qallatti malee hin cittu.",
            "Iji baduuf dhibee hin dadhabu."
        ];

        function newMammaaksa() {
            const display = document.getElementById('mammaaksa-display');
            const randomIndex = Math.floor(Math.random() * mammaaksota.length);
            display.innerText = mammaaksota[randomIndex];
        }
    </script>

</body>
</html>
