<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mammaaksa Oromoo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 450px;
            background: #fff;
            color: #333;
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border-bottom: 10px solid #cc0000; /* Diimaa */
            border-top: 10px solid #000;    /* Gurraacha */
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; color: #222; }
        .quote-box {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border-left: 5px solid #cc0000;
            border-radius: 10px;
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        button {
            background: #000;
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        button:hover { background: #cc0000; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mammaaksa Oromoo</h1>
        <p style="color: #777;">Ogummaa Abbootii</p>
        
        <div class="quote-box" id="mammaaksa-display">
            "Abbaan dammaa harka isaa damma."
        </div>

        <button onclick="newMammaaksa()">Mammaaksa Biraa</button>
    </div>

    <script>
        const mammaaksota = [
            "Abbaan dammaa harka isaa damma.",
            "Gamni gorsa beeka, gowwaan immoo rakkina.",
            "Haati dabeessaa ija hin dunnattu.",
            "Oduun baduun, deebi’uun hin badu.",
            "Bishaan deemee deemee bakka ciisaa isaa hin wallaalu.",
            "Kan qabateen badu, kan gadhiseen fadu.",
            "Luka dhuunfaa qabanitti daggala ce'u.",
            "Dhugaan ni qallatti malee hin cittu.",
            "Iji baduuf dhibee hin dadhabu."
        ];

        function newMammaaksa() {
            const display = document.getElementById('mammaaksa-display');
            const randomIndex = Math.floor(Math.random() * mammaaksota.length);
            display.innerText = mammaaksota[randomIndex];
        }
    </script>
</body>
</html>
